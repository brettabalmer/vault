name: release

# Tag a release: `git tag v0.1.0 && git push --tags`. Builds NativeAOT binaries per-OS, attaches them to a
# GitHub Release, and (optionally) publishes the reader packages. npm publish is gated on the `PUBLISH_NPM`
# repo variable + `NPM_TOKEN` secret; NuGet publish on `PUBLISH_NUGET` + the `NUGET_USER` variable, using
# Trusted Publishing (OIDC) — no NuGet API-key secret.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - os: macos-14      # Apple Silicon
            rid: osx-arm64
          # Intel-Mac binary is CROSS-BUILT on the arm64 runner — self-contained single-file needs no Intel
          # hardware. Avoids the macos-13 runner, which GitHub is retiring (jobs sat queued forever).
          - os: macos-14
            rid: osx-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      # Self-contained single-file (not NativeAOT): NativeAOT's link step fails on the macOS runners
      # (System.Security.Cryptography's Apple/Swift backend + -ld_classic can't resolve Swift symbols).
      # Self-contained is reliable across runners and still a standalone binary (no runtime prereq).
      - run: >-
          dotnet publish src/Vault.Cli/Vault.Cli.csproj -r ${{ matrix.rid }} -c Release
          -p:PublishAot=false -p:PublishSingleFile=true -p:SelfContained=true
          -p:StripSymbols=true -p:EnableCompressionInSingleFile=true -o dist
      - name: Package
        run: |
          cd dist
          tar -czf "../vault-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz" vault
      - uses: softprops/action-gh-release@v2
        with:
          files: vault-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz
          fail_on_unmatched_files: true

  npm:
    runs-on: ubuntu-latest
    needs: binaries
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - working-directory: packages/js
        run: node --test
      - working-directory: packages/js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  nuget:
    runs-on: ubuntu-latest
    needs: binaries
    if: ${{ vars.PUBLISH_NUGET == 'true' }}
    # Trusted Publishing (OIDC) — no long-lived API key. Requires a trusted-publisher policy on nuget.org for
    # repo brettabalmer/vault + workflow release.yml + glob `Brettabalmer.Vault.*`, and the NUGET_USER variable.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet test src/Vault.Tests/Vault.Tests.csproj -c Release
      # The reader library ships as `Brettabalmer.Vault.Reader` (PackageId set in Vault.Core.csproj).
      # Version comes from the csproj <Version>; keep it in step with the tag.
      - run: dotnet pack src/Vault.Core/Vault.Core.csproj -c Release -o nupkg
      - uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}
      - run: dotnet nuget push "nupkg/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
